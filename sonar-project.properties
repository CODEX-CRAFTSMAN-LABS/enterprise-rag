# SonarQube / SonarCloud — https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner-for-gradle/
sonar.projectKey=enterprise-rag
sonar.projectName=Enterprise RAG
sonar.projectVersion=0.1.0-SNAPSHOT

sonar.sourceEncoding=UTF-8
sonar.java.source=17
sonar.java.target=17

# Multi-module Gradle
sonar.modules=rag-common,ingestion-service,query-service

sonar.sources=rag-common/src/main,ingestion-service/src/main,query-service/src/main
sonar.tests=rag-common/src/test,ingestion-service/src/test,query-service/src/test

sonar.java.binaries=rag-common/build/classes,rag-common/build/classes/java/main,\
  ingestion-service/build/classes,ingestion-service/build/classes/java/main,\
  query-service/build/classes,query-service/build/classes/java/main

sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/aggregated/jacocoTestReport.xml

# Exclude generated / boilerplate from coverage expectations
sonar.coverage.exclusions=**/*Application.java,**/*Entity.java,**/dto/**,**/config/**,**/ports/**,**/adapters/out/**

# Quality gate hints (configure in SonarQube UI)
# - Coverage on new code > 80%
# - 0 blocker/critical vulnerabilities
# - Duplications < 3%
