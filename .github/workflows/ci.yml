# GitHub Actions — runs on every branch (push + PR)
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Spotless (format check)
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build and unit tests
        run: ./gradlew build jacocoAggregatedReport --no-daemon

      - name: Coverage gate (25% line minimum)
        run: ./gradlew coverageCheck -PcoverageMinimum=0.25 --no-daemon

      - name: Upload JaCoCo aggregated report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: |
            build/reports/jacoco/aggregated/
            **/build/reports/jacoco/test/

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: Gradle Test Results
          fail_on_failure: true

      - name: Add coverage PR comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: build/reports/jacoco/aggregated/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 25
          min-coverage-changed-files: 20
          title: 'Code Coverage'
          update-comment: true

  # Optional: SonarCloud — enable when SONAR_TOKEN secret is configured
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew

      - name: Build with coverage for Sonar
        run: ./gradlew build jacocoAggregatedReport --no-daemon

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Build ingestion image
        run: docker build -f ingestion-service/Dockerfile -t enterprise-rag/ingestion-service:ci .

      - name: Build query image
        run: docker build -f query-service/Dockerfile -t enterprise-rag/query-service:ci .
