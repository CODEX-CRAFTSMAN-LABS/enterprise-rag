# GitHub Actions — runs on every branch (push + PR)
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Spotless (format check)
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build and unit tests
        run: ./gradlew build jacocoAggregatedReport --no-daemon

      - name: Coverage gate (75% line minimum)
        run: ./gradlew coverageCheck -PcoverageMinimum=0.75 --no-daemon

      - name: Upload JaCoCo aggregated report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: |
            build/reports/jacoco/aggregated/
            **/build/reports/jacoco/test/

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: Gradle Test Results
          fail_on_failure: true

      - name: Add coverage PR comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: build/reports/jacoco/aggregated/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 75
          min-coverage-changed-files: 70
          title: 'Code Coverage'
          update-comment: true

  sonar-ready:
    name: Sonar readiness
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          SONAR_ENABLED: ${{ vars.SONAR_ENABLED }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ "${SONAR_ENABLED}" = "true" ] && [ -n "${SONAR_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  # Optional: SonarCloud — enable when SONAR_TOKEN secret is configured
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - sonar-ready
    if: ${{ needs.sonar-ready.outputs.enabled == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew

      - name: Build with coverage for Sonar
        run: ./gradlew build jacocoAggregatedReport --no-daemon

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ecr-ready:
    name: ECR push readiness
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ECR_PUSH_ENABLED: ${{ vars.ECR_PUSH_ENABLED }}
        run: |
          if [ "${ECR_PUSH_ENABLED}" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "::warning::Set repository variable AWS_ACCOUNT_ID (e.g. 440977419877)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Set secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  docker-images:
    name: Docker Images
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - ecr-ready
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Derive image tags
        id: image-meta
        shell: bash
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
        run: |
          ref_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          commit_tag="${GITHUB_SHA}"
          short_tag="sha-${GITHUB_SHA::12}"
          region="${AWS_REGION:-ap-south-1}"
          account_id="${AWS_ACCOUNT_ID}"
          if [ -n "${account_id}" ]; then
            registry="${account_id}.dkr.ecr.${region}.amazonaws.com"
          else
            registry="local.enterprise-rag.build"
            echo "::warning::AWS_ACCOUNT_ID not set — building images only; ECR push will be skipped."
          fi
          ingestion_repo="${ECR_INGESTION_REPOSITORY:-enterprise-rag-ingestion-service}"
          query_repo="${ECR_QUERY_REPOSITORY:-enterprise-rag-query-service}"
          echo "ref_tag=${ref_tag}" >> "$GITHUB_OUTPUT"
          echo "commit_tag=${commit_tag}" >> "$GITHUB_OUTPUT"
          echo "short_tag=${short_tag}" >> "$GITHUB_OUTPUT"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "ingestion_image=${registry}/${ingestion_repo}" >> "$GITHUB_OUTPUT"
          echo "query_image=${registry}/${query_repo}" >> "$GITHUB_OUTPUT"

      - name: Build ingestion image
        run: |
          docker build --platform linux/amd64 \
            -f ingestion-service/Dockerfile \
            -t "${{ steps.image-meta.outputs.ingestion_image }}:${{ steps.image-meta.outputs.commit_tag }}" \
            .

      - name: Build query image
        run: |
          docker build --platform linux/amd64 \
            -f query-service/Dockerfile \
            -t "${{ steps.image-meta.outputs.query_image }}:${{ steps.image-meta.outputs.commit_tag }}" \
            .

      - name: Verify image tags
        run: |
          docker image inspect "${{ steps.image-meta.outputs.ingestion_image }}:${{ steps.image-meta.outputs.commit_tag }}" >/dev/null
          docker image inspect "${{ steps.image-meta.outputs.query_image }}:${{ steps.image-meta.outputs.commit_tag }}" >/dev/null

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request' && needs.ecr-ready.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request' && needs.ecr-ready.outputs.enabled == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push images to Amazon ECR
        if: github.event_name != 'pull_request' && needs.ecr-ready.outputs.enabled == 'true'
        env:
          INGESTION_IMAGE: ${{ steps.image-meta.outputs.ingestion_image }}
          QUERY_IMAGE: ${{ steps.image-meta.outputs.query_image }}
          COMMIT_TAG: ${{ steps.image-meta.outputs.commit_tag }}
          SHORT_TAG: ${{ steps.image-meta.outputs.short_tag }}
          REF_TAG: ${{ steps.image-meta.outputs.ref_tag }}
        run: |
          # Primary tag: full Git commit SHA (deploy with this in Jenkins IMAGE_TAG)
          docker push "${INGESTION_IMAGE}:${COMMIT_TAG}"
          docker push "${QUERY_IMAGE}:${COMMIT_TAG}"
          # Alias tags on the same image digest
          docker tag "${INGESTION_IMAGE}:${COMMIT_TAG}" "${INGESTION_IMAGE}:${SHORT_TAG}"
          docker tag "${QUERY_IMAGE}:${COMMIT_TAG}" "${QUERY_IMAGE}:${SHORT_TAG}"
          docker push "${INGESTION_IMAGE}:${SHORT_TAG}"
          docker push "${QUERY_IMAGE}:${SHORT_TAG}"
          docker tag "${INGESTION_IMAGE}:${COMMIT_TAG}" "${INGESTION_IMAGE}:${REF_TAG}"
          docker tag "${QUERY_IMAGE}:${COMMIT_TAG}" "${QUERY_IMAGE}:${REF_TAG}"
          docker push "${INGESTION_IMAGE}:${REF_TAG}"
          docker push "${QUERY_IMAGE}:${REF_TAG}"
          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            docker tag "${INGESTION_IMAGE}:${COMMIT_TAG}" "${INGESTION_IMAGE}:latest"
            docker tag "${QUERY_IMAGE}:${COMMIT_TAG}" "${QUERY_IMAGE}:latest"
            docker push "${INGESTION_IMAGE}:latest"
            docker push "${QUERY_IMAGE}:latest"
          fi
          echo "Pushed to ECR (one digest, multiple tags):"
          echo "  commit (deploy): ${INGESTION_IMAGE}:${COMMIT_TAG}"
          echo "  short alias:     ${INGESTION_IMAGE}:${SHORT_TAG}"
          echo "  branch alias:    ${INGESTION_IMAGE}:${REF_TAG}"
          echo "ECR also stores immutable digest sha256:... for this image."
          echo "Jenkins deploy: set IMAGE_TAG=${COMMIT_TAG}"

      - name: ECR push skipped
        if: github.event_name == 'pull_request' || needs.ecr-ready.outputs.enabled != 'true'
        run: |
          echo "ECR push skipped."
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Configure repo Settings → Secrets and variables → Actions:"
            echo "  Variables: AWS_ACCOUNT_ID=440977419877, AWS_REGION=ap-south-1"
            echo "  Secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY"
          fi
          echo "Commit tag when push works: ${GITHUB_SHA}"
