# Requires Prometheus Operator — scrapes Actuator metrics (sidecar pattern alternative documented in README)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: enterprise-rag-services
  namespace: enterprise-rag
  labels:
    release: prometheus
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [ingestion-service, query-service]
  namespaceSelector:
    matchNames: [enterprise-rag]
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
