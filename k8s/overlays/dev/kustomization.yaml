apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: enterprise-rag-dev

resources:
  - namespace.yaml
  - ../../base
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml
  - monitoring/grafana-secret.yaml

labels:
  - pairs:
      environment: dev
    includeSelectors: true
    includeTemplates: true

images:
  - name: enterprise-rag/ingestion-service
    newTag: dev
  - name: enterprise-rag/query-service
    newTag: dev

replicas:
  - name: ingestion-service
    count: 1
  - name: query-service
    count: 1

patches:
  - path: patches/configmap-env.yaml
  - path: patches/resources.yaml
