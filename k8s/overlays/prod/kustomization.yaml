apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: enterprise-rag-prod

resources:
  - namespace.yaml
  - ../../base
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml
  - monitoring/grafana-secret.yaml

labels:
  - pairs:
      environment: prod
    includeSelectors: true
    includeTemplates: true

images:
  - name: enterprise-rag/ingestion-service
    newTag: prod
  - name: enterprise-rag/query-service
    newTag: prod

replicas:
  - name: ingestion-service
    count: 2
  - name: query-service
    count: 3

patches:
  - path: patches/configmap-env.yaml
  - path: patches/resources.yaml
  - path: patches/pod-antiaffinity.yaml
