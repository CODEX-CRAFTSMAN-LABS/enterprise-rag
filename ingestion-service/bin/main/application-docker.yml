spring:
  config:
    activate:
      on-profile: docker
  autoconfigure:
    exclude: []
  datasource:
    url: jdbc:postgresql://postgres:5432/rag
    username: rag
    password: rag
  kafka:
    bootstrap-servers: kafka:9092
  data:
    redis:
      host: redis
      port: 6379
  ai:
    model:
      embedding: ollama
    ollama:
      base-url: http://ollama:11434
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768

management:
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.0

platform:
  rate-limit:
    enabled: true
    requests-per-minute: 60
    redis-backed: true

ingestion:
  outbox:
    enabled: true
    batch-size: 50
    poll-interval: 2s
  saga:
    enabled: true
  chunking:
    size: 800
    overlap: 100
  kafka:
    document-uploaded-topic: document.uploaded
    document-parsed-topic: document.parsed
    document-chunked-topic: document.chunked
    document-ingestion-failed-topic: document.ingestion.failed
