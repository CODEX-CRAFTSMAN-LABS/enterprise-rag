spring:
  profiles:
    active: local
  application:
    name: ingestion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/rag
    username: rag
    password: rag
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ingestion-service
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

platform:
  rate-limit:
    enabled: true
    requests-per-minute: 60
    redis-backed: false
  tenant:
    header-name: X-Tenant-Id
    required: true

ingestion:
  outbox:
    enabled: false
    batch-size: 50
    poll-interval: 2s
  saga:
    enabled: false
  chunking:
    size: 800
    overlap: 100
  kafka:
    document-uploaded-topic: document.uploaded
    document-parsed-topic: document.parsed
    document-chunked-topic: document.chunked
    document-ingestion-failed-topic: document.ingestion.failed

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

logging:
  level:
    com.enterprise.rag: INFO
